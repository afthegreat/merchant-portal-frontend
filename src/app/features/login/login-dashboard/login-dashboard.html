<div class="login-wrapper">
    <div class="login-box">
        <!-- Branding Section -->
        <div class="login-branding">
            <div class="branding-content">
                <mat-icon class="branding-icon">item</mat-icon>
                <h2 class="branding-title">Merchant Portal</h2>
                <p class="branding-text">Manage your business and serve your customers better.</p>
            </div>
            <!-- Background overlay effect -->
            <div class="branding-overlay"></div>
        </div>

        <!-- Form Section -->
        <div class="login-form-container">
            <div class="form-header">
                <h1>Welcome Back</h1>
                <p>Please enter your details to sign in.</p>
            </div>

            <form class="form-content" (submit)="$event.preventDefault()">

                @if (authService.error()) {
                <p class="error-message">
                    {{ authService.error() }}
                </p>
                }

                <mat-form-field appearance="outline" class="form-field">
                    <mat-label>Username</mat-label>
                    <input matInput type="text" [(ngModel)]="username" name="username" required>
                    <mat-icon matSuffix class="field-icon">person</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline" class="form-field">
                    <mat-label>Password</mat-label>
                    <input matInput type="password" [(ngModel)]="password" name="password" required>
                    <mat-icon matSuffix class="field-icon">lock</mat-icon>
                </mat-form-field>

                <div class="form-actions-top">
                    <a href="javascript:void(0)" class="forgot-link">Forgot password?</a>
                </div>

                <button mat-flat-button color="primary" class="submit-btn"
                    [disabled]="authService.isLoading() || !username || !password" (click)="onLogin()">

                    @if (authService.isLoading()) {
                    <span>Signing in...</span>
                    } @else {
                    <span>Sign In</span>
                    }
                </button>
            </form>

            <div class="form-footer">
                <p>Don't have an account? <a href="#">Contact admin</a></p>
            </div>
        </div>
    </div>
</div>
